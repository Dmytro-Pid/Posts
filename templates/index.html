{% extends 'base.html' %}

{% block content %}
<table class="table table-striped table-hover"></table>
<table>
    <thead>
        <tr>
            <th></th>
            <th>Heading</th>
            <th>Statement</th>
            <th>Date</th>
            <th>Author</th>
            <th>Image</th>
        </tr>
    </thead>
    <tbody>
        {% for post in posts %}
        <tr>
            <td>{{ post.id }}</td>
            <td>{{ post.title }}</td>
            <td>{{ post.text }}</td>
            <td>{{ post.created }}</td>
            <td>{{ post.user.username }}</td>
            {% if post.image %}
            <td> <img src='{{ url_for("static", filename=post.image) }}' alt='Image' width='100'> </td>
            {% else%}
            <td><img src="https://setam.net.ua/images/compat/big/2824.jpg" alt='image' </td>
            {% endif %}
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
