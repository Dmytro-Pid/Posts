{% extends "base.html" %}

{% block content %}
<form method="post" enctype="multipart/form-data">
    <div>
        <label>Title</label>
        <input type="text" name="title" required>
    </div>
    <div>
        <label>Content</label>
        <input type="text" name = "text" required>
    </div>
    <div>
        <label>Image</label>
        <input type="file" name="image">
    </div>
    <button type="submit">Add post</button>
</form>
{% endblock content %}
